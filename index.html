<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGJ Report Charts</title>
    <link rel="stylesheet" href="src/css/styles.css" />
</head>

<body>
    <h1>CGJ Report Charts</h1>
    <p class="subtitle">Explore CGJ data</p>

    <div class="controls">
        <label for="from-year">From:</label>
        <select id="from-year"></select>

        <label for="to-year">To:</label>
        <select id="to-year"></select>

        <label for="view-select">Group by:</label>
        <select id="view-select"></select>

        <label for="split-select">Split by:</label>
        <select id="split-select"></select>

        <span id="stack-wrap" hidden>
            <label for="stack-select">Display:</label>
            <select id="stack-select">
                <option value="grouped">Side by side</option>
                <option value="stacked">Stacked</option>
                <option value="percent">100%</option>
            </select>
        </span>
    </div>

    <div class="controls" id="exclude-bos-wrap" hidden>
        <label>
            <input type="checkbox" id="exclude-bos" />
            Exclude Board of Supervisors
        </label>
    </div>

    <div class="panel">
        <div class="chart-scroll">
            <div class="chart-inner">
                <canvas id="chart"></canvas>
            </div>
        </div>
        <p id="error"></p>
    </div>

    <details id="readme-box">
        <summary>About this data</summary>
        <div id="readme-content">Loading...</div>
    </details>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="src/js/app.js"></script>
    <script src="src/js/md.js"></script>
</body>

</html>
