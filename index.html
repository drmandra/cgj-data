<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGJ Report Charts</title>
    <link rel="stylesheet" href="src/css/styles.css" />
</head>

<body>
    <h1>CGJ Report Charts</h1>
    <p class="subtitle">Explore CGJ data</p>
    <p class="subtitle">Clicking any bar will give a list of the reports matching that data.</p>

    <!-- View 1 -->
    <div class="controls">
        <label for="from-year">From:</label>
        <select id="from-year"></select>

        <label for="to-year">To:</label>
        <select id="to-year"></select>

        <label for="view-select">Group by:</label>
        <select id="view-select"></select>

        <label for="split-select">Split by:</label>
        <select id="split-select"></select>

        <span id="stack-wrap" hidden>
            <label for="stack-select">Display:</label>
            <select id="stack-select">
                <option value="stacked">Stacked</option>
                <option value="percent">100%</option>
            </select>
        </span>
    </div>

    <div class="controls" id="exclude-bos-wrap" hidden>
        <label>
            <input type="checkbox" id="exclude-bos" />
            Exclude Board of Supervisors
        </label>
    </div>

    <div class="panel">
        <div class="chart-scroll">
            <div class="chart-inner">
                <canvas id="chart"></canvas>
            </div>
        </div>
        <p id="error"></p>
    </div>

    <div id="overview-report-list" class="report-list"></div>

    <!-- View 2 -->
    <hr />
    <h2>Drill down</h2>
    <p class="subtitle">Pick one field, then rank another within it.</p>

    <div class="controls">
        <label for="drill-x">Pick a</label>
        <select id="drill-x"></select>

        <span class="drill-arrow">→ rank its</span>

        <select id="drill-y"></select>
    </div>

    <div class="controls">
        <label for="drill-value">Which:</label>
        <select id="drill-value"></select>
    </div>

    <div class="panel">
        <div class="chart-scroll">
            <div class="chart-inner">
                <canvas id="drill-chart"></canvas>
            </div>
        </div>
        <p id='drill-error'></p>
    </div>

    <div id="drill-report-list" class="report-list"></div>


    <!-- README box -->
    <details id="readme-box">
        <summary>About this data</summary>
        <div id="readme-content">Loading...</div>
    </details>

    <p>
        <a href="https://github.com/drmandra/cgj-data" target="_blank">
        <image src="images/mark-github-16.svg" alt="github logo">
        </a>
    </p>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="src/js/app.js"></script>
    <script src="src/js/md.js"></script>
</body>

</html>
